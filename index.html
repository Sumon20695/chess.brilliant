<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Brilliant Chess Moves</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
:root {
    --bg1: #1e3c72;
    --bg2: #2a5298;
    --text: #ffffff;
    --card: rgba(255,255,255,0.1);
}

body.light {
    --bg1: #f5f7fa;
    --bg2: #c3cfe2;
    --text: #111;
    --card: rgba(0,0,0,0.05);
}

body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    color: var(--text);

    background:
        linear-gradient(-45deg, var(--bg1), var(--bg2), #000428, #004e92),
        url('https://www.transparenttextures.com/patterns/asfalt-light.png');

    background-blend-mode: overlay;
    background-size: 400% 400%, auto;
    animation: gradient 12s ease infinite;
}

@keyframes gradient {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

.container {
    padding: 30px;
    text-align: center;
}

h1 a {
    text-decoration: none;
    color: var(--text);
    font-size: 2.5rem;
    background: var(--card);
    padding: 12px 25px;
    border-radius: 12px;
}

/* Toggle */
.toggle {
    position: absolute;
    top: 20px;
    right: 20px;
    cursor: pointer;
    padding: 10px 15px;
    border-radius: 50px;
    background: var(--card);
}

/* 🔥 SLIDER CONTAINER */
.slider-wrapper {
    display: flex;
    align-items: center;
    justify-content: center;   /* ✅ CENTER EVERYTHING */
    gap: 10px;
    margin-top: 30px;
    width: 100%;
}

/* Arrow buttons */
.arrow {
    width: 45px;
    height: 45px;
    flex-shrink: 0;
}
/* Scrollable game list */
.tab-buttons {
    display: flex;
    overflow-x: auto;
    scroll-behavior: smooth;
    gap: 10px;
    padding: 10px;

    max-width: 700px;   /* ✅ LIMIT WIDTH (important) */
    width: 100%;
    
    scrollbar-width: none;
}

.tab-buttons::-webkit-scrollbar {
    display: none;
}

.tab-buttons button {
    flex: 0 0 auto;
    padding: 10px 20px;
    border: none;
    cursor: pointer;
    border-radius: 8px;
    background: var(--card);
    color: var(--text);
    scroll-snap-align: center;
}

.tab-buttons button.active {
    background: #ffcc00;
    color: #000;
}

/* Snap scrolling */
.tab-buttons {
    scroll-snap-type: x mandatory;
}

/* Board */
.board {
    margin-top: 20px;
    max-width: 900px;
    margin-left: auto;
    margin-right: auto;
    background: var(--card);
    padding: 20px;
    border-radius: 15px;
}

.tab-content {
    display: none;
    opacity: 0;
    transform: translateY(10px);
    transition: 0.3s;
}

.tab-content.active {
    display: block;
    opacity: 1;
    transform: translateY(0);
}

</style>
</head>

<body>

<div class="toggle" onclick="toggleMode()">🌗</div>

<div class="container">

<h1>
<a href="https://www.chess.com/analysis/collection/brilliant-moves-a2yjTqFt/2p15VqLD7C/games" target="_blank">
♟ Brilliant Chess Moves ♟
</a>
</h1>

<!-- 🔥 SLIDER -->
<div class="slider-wrapper">
    <button class="arrow" onclick="scrollTabs(-200)">◀</button>
    <div class="tab-buttons" id="buttons"></div>
    <button class="arrow" onclick="scrollTabs(200)">▶</button>
</div>

<div id="content"></div>

</div>

<script>

// 🔥 EDIT HERE ONLY
const games = [
    15003339,
    15003683,
    15003671,
    15003667,
    15003647,
    15003779,
    15003791
];

// Theme
function toggleMode() {
    document.body.classList.toggle("light");
    localStorage.setItem("theme",
        document.body.classList.contains("light") ? "light" : "dark"
    );
}

window.onload = () => {
    if (localStorage.getItem("theme") === "light") {
        document.body.classList.add("light");
    }
    generateGames();
};

// Generate UI
function generateGames() {
    const btnContainer = document.getElementById("buttons");
    const contentContainer = document.getElementById("content");

    games.forEach((id, index) => {

        const btn = document.createElement("button");
        btn.innerText = "Game " + (index + 1);
        btn.onclick = (e) => openTab(e, "game" + index);

        if (index === 0) btn.classList.add("active");
        btnContainer.appendChild(btn);

        const div = document.createElement("div");
        div.id = "game" + index;
        div.className = "tab-content board" + (index === 0 ? " active" : "");

        const iframe = document.createElement("iframe");
        iframe.id = id;
        iframe.dataset.src = `https://www.chess.com/emboard?id=${id}`;
        iframe.style.width = "100%";
        iframe.style.border = "none";
        iframe.style.minHeight = "500px";
        iframe.loading = "lazy";

        div.appendChild(iframe);
        contentContainer.appendChild(div);

        if (index === 0) iframe.src = iframe.dataset.src;
    });
}

// Tabs
function openTab(evt, tabName) {
    document.querySelectorAll(".tab-content").forEach(c => c.classList.remove("active"));
    document.querySelectorAll(".tab-buttons button").forEach(b => b.classList.remove("active"));

    const activeTab = document.getElementById(tabName);
    activeTab.classList.add("active");
    evt.currentTarget.classList.add("active");

    // 🔥 AUTO CENTER ACTIVE BUTTON
    evt.currentTarget.scrollIntoView({ behavior: "smooth", inline: "center" });

    const iframe = activeTab.querySelector("iframe");
    if (iframe && !iframe.src) {
        iframe.src = iframe.dataset.src;
    }
}

// 🔥 ARROW SCROLL
function scrollTabs(amount) {
    document.getElementById("buttons").scrollBy({
        left: amount,
        behavior: "smooth"
    });
}

// Resize fix
window.addEventListener("message", e => {
    if (e.data && e.data.id) {
        const iframe = document.getElementById(e.data.id);
        if (iframe) {
            iframe.style.height = (e.data.frameHeight + 37) + "px";
        }
    }
});

</script>

</body>
</html>
